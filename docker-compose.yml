services:
  beacon:
    build: .
    volumes:
      - ~/MirrorDNA-Vault:/vault:ro
      - ~/.mirrordna/sandbox/ag:/app/output
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ipfs:
    image: ipfs/kubo:latest
    ports:
      - "4001:4001"
      - "5001:5001"
      - "8080:8080"
    volumes:
      - ~/.ipfs:/export
      - ~/.ipfs_data:/data/ipfs
