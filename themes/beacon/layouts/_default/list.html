{{ define "main" }}
<section class="list-section">
    <h1>{{ .Title }}</h1>
    <ul class="post-list">
        {{ range .Pages }}
        <li class="post-item">
            <div class="post-meta">
                <time class="post-date" datetime="{{ .Date.Format " 2006-01-02" }}">
                    {{ .Date.Format "2006 / 01 / 02" }}
                </time>
                {{ if .Params.signed }}
                <span class="post-signed">⟡ SIGNED</span>
                {{ end }}
            </div>
            <h2 class="post-title">
                <a href="{{ .RelPermalink }}">{{ .Title }}</a>
            </h2>
            {{ with .Summary }}
            <p class="post-summary">{{ . }}</p>
            {{ end }}
        </li>
        {{ end }}
    </ul>
</section>
{{ end }}
